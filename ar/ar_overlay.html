<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reactor AR Overlay</title>
  <!-- A-Frame + AR.js (FREE, no API key needed) -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; font-family: 'Courier New', monospace; background: #000; }

    /* HUD overlay */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 1000;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem 1rem;
      background: rgba(0,0,0,0.7);
      border-bottom: 1px solid rgba(0,212,255,0.3);
      color: #00d4ff;
      font-size: 0.75rem;
      letter-spacing: 0.1em;
    }

    #hud-status {
      font-weight: bold;
      font-size: 0.9rem;
    }

    #hud-tip {
      color: #5a8fa8;
      font-size: 0.65rem;
    }

    /* Quick data panel (shown always, for devices without camera access) */
    #quick-panel {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      z-index: 1000;
      background: rgba(4,22,36,0.9);
      border-top: 1px solid rgba(0,212,255,0.3);
      padding: 0.75rem 1rem;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.5rem;
    }

    .qp-item {
      text-align: center;
    }

    .qp-label {
      font-size: 0.55rem;
      color: #5a8fa8;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .qp-value {
      font-size: 1.1rem;
      font-weight: bold;
      color: #00d4ff;
      line-height: 1.3;
    }

    .qp-unit {
      font-size: 0.6rem;
      color: #5a8fa8;
    }

    /* Status colors */
    .status-safe     { color: #00ff87; }
    .status-warning  { color: #ffd700; }
    .status-critical { color: #ff3333; animation: flash 0.8s infinite alternate; }

    @keyframes flash {
      from { opacity: 1; }
      to   { opacity: 0.5; }
    }

    /* AR instructions overlay */
    #instructions {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 999;
      background: rgba(4,22,36,0.85);
      border: 1px solid rgba(0,212,255,0.4);
      padding: 2rem;
      border-radius: 4px;
      text-align: center;
      color: #e0f4ff;
      max-width: 320px;
      display: none; /* hidden once AR starts */
    }

    #instructions h2 {
      color: #00d4ff;
      font-size: 1rem;
      margin-bottom: 1rem;
      letter-spacing: 0.1em;
    }

    #instructions p {
      font-size: 0.78rem;
      color: #5a8fa8;
      line-height: 1.6;
    }

    .marker-img {
      width: 120px;
      height: 120px;
      margin: 1rem auto;
      border: 2px solid #00d4ff;
      display: block;
      background: white;
    }
  </style>
</head>
<body>

<!-- HUD Top Bar -->
<div id="hud">
  <div>☢ REACTOR AR MONITOR</div>
  <div id="hud-status">CONNECTING...</div>
  <div id="hud-tip">Point at HIRO marker</div>
</div>

<!-- Bottom Quick Panel -->
<div id="quick-panel">
  <div class="qp-item">
    <div class="qp-label">Temperature</div>
    <div class="qp-value" id="qp-temp">--</div>
    <div class="qp-unit">°C</div>
  </div>
  <div class="qp-item">
    <div class="qp-label">Radiation</div>
    <div class="qp-value" id="qp-rad">--</div>
    <div class="qp-unit">UV IDX</div>
  </div>
  <div class="qp-item">
    <div class="qp-label">Coolant</div>
    <div class="qp-value" id="qp-cool">--</div>
    <div class="qp-unit">%</div>
  </div>
  <div class="qp-item">
    <div class="qp-label">Gas Status</div>
    <div class="qp-value" id="qp-gas">--</div>
    <div class="qp-unit">SENSOR</div>
  </div>
</div>

<!--
  A-FRAME AR SCENE
  Uses AR.js with the default "HIRO" marker.
  Print the HIRO marker from: https://raw.githubusercontent.com/AR-js-org/AR.js/master/data/images/hiro.png
-->
<a-scene
  embedded
  arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix; matrixCodeType: 3x3;"
  vr-mode-ui="enabled: false"
  renderer="logarithmicDepthBuffer: true; precision: medium;"
>

  <!-- HIRO Marker: print this marker and point camera at it -->
  <a-marker preset="hiro" id="hiro-marker">

    <!-- Background panel -->
    <a-plane
      color="#041624"
      opacity="0.88"
      width="2.4"
      height="2.8"
      position="0 1.4 0"
      rotation="-90 0 0"
    ></a-plane>

    <!-- Title -->
    <a-text
      id="ar-title"
      value="REACTOR SAFETY MONITOR"
      color="#00d4ff"
      align="center"
      width="3"
      position="0 2.7 0.01"
      rotation="-90 0 0"
      font="kelsonsans"
    ></a-text>

    <!-- Status line -->
    <a-text
      id="ar-status"
      value="STATUS: LOADING"
      color="#00ff87"
      align="center"
      width="2.5"
      position="0 2.35 0.01"
      rotation="-90 0 0"
    ></a-text>

    <!-- Separator -->
    <a-plane color="#0f3a57" width="2.2" height="0.02" position="0 2.15 0.01" rotation="-90 0 0"></a-plane>

    <!-- Temperature Row -->
    <a-text value="CORE TEMP"   color="#5a8fa8" width="1.8" position="-0.9 2.0 0.01" rotation="-90 0 0"></a-text>
    <a-text id="ar-temp" value="-- °C"         color="#ff6b35" width="1.8" position="0.5 2.0 0.01" rotation="-90 0 0"></a-text>

    <!-- Radiation Row -->
    <a-text value="RADIATION"   color="#5a8fa8" width="1.8" position="-0.9 1.7 0.01" rotation="-90 0 0"></a-text>
    <a-text id="ar-rad" value="-- UV"          color="#ff3333" width="1.8" position="0.5 1.7 0.01" rotation="-90 0 0"></a-text>

    <!-- Gas Row -->
    <a-text value="GAS/LEAK"    color="#5a8fa8" width="1.8" position="-0.9 1.4 0.01" rotation="-90 0 0"></a-text>
    <a-text id="ar-gas" value="--"             color="#00ff87" width="1.8" position="0.5 1.4 0.01" rotation="-90 0 0"></a-text>

    <!-- Coolant Row -->
    <a-text value="COOLANT"     color="#5a8fa8" width="1.8" position="-0.9 1.1 0.01" rotation="-90 0 0"></a-text>
    <a-text id="ar-cool" value="-- %"          color="#00d4ff" width="1.8" position="0.5 1.1 0.01" rotation="-90 0 0"></a-text>

    <!-- Separator -->
    <a-plane color="#0f3a57" width="2.2" height="0.02" position="0 0.62 0.01" rotation="-90 0 0"></a-plane>

    <!-- AI Row -->
    <a-text value="AI ANOMALY" color="#5a8fa8" width="1.8" position="-0.9 0.45 0.01" rotation="-90 0 0"></a-text>
    <a-text id="ar-ai" value="--"             color="#00d4ff" width="1.8" position="0.5 0.45 0.01" rotation="-90 0 0"></a-text>

    <!-- Timestamp -->
    <a-text id="ar-time" value="" color="#2a5a7a" align="center" width="2" position="0 0.15 0.01" rotation="-90 0 0"></a-text>

    <!-- Spinning reactor decoration -->
    <a-torus-knot
      color="#00d4ff"
      radius="0.15"
      radius-tubular="0.02"
      position="0 0.8 -1"
      animation="property: rotation; to: 360 360 0; dur: 8000; loop: true; easing: linear"
      opacity="0.3"
    ></a-torus-knot>

  </a-marker>

  <!-- Camera -->
  <a-entity camera></a-entity>

</a-scene>

<script>
const API = 'http://localhost:5000/api/ar';  // Change to your server IP on mobile

const STATUS_COLORS = {
  SAFE:     '#00ff87',
  WARNING:  '#ffd700',
  CRITICAL: '#ff3333',
};

// Helper: set A-Frame text component
function setAR(id, value, color) {
  const el = document.getElementById(id);
  if (!el) return;
  el.setAttribute('value', value);
  if (color) el.setAttribute('color', color);
}

// Update HUD + quick panel
function updateHUD(d) {
  const col = STATUS_COLORS[d.status] || '#00d4ff';
  const hud = document.getElementById('hud-status');
  hud.textContent = d.status;
  hud.style.color  = col;

  document.getElementById('qp-temp').textContent = d.temperature?.toFixed(1) ?? '--';
  document.getElementById('qp-temp').style.color = d.temperature >= 70 ? '#ff3333' : d.temperature >= 50 ? '#ffd700' : '#00d4ff';

  document.getElementById('qp-rad').textContent  = d.radiation?.toFixed(2) ?? '--';
  document.getElementById('qp-rad').style.color  = d.radiation >= 7 ? '#ff3333' : d.radiation >= 5 ? '#ffd700' : '#00d4ff';

  document.getElementById('qp-cool').textContent = d.coolant?.toFixed(1) ?? '--';
  document.getElementById('qp-cool').style.color = d.coolant < 10 ? '#ff3333' : d.coolant < 30 ? '#ffd700' : '#00d4ff';

  document.getElementById('qp-gas').textContent  = d.gas_status ?? '--';
  document.getElementById('qp-gas').style.color  = d.gas_status === 'LEAK' ? '#ff3333' : '#00ff87';
}

// Update A-Frame AR text components
function updateAR(d) {
  const col = STATUS_COLORS[d.status] || '#00d4ff';

  setAR('ar-status',  `STATUS: ${d.status}`, col);
  setAR('ar-temp',    `${d.temperature?.toFixed(1) ?? '--'} C`,
    d.temperature >= 70 ? '#ff3333' : d.temperature >= 50 ? '#ffd700' : '#00ff87');
  setAR('ar-rad',     `${d.radiation?.toFixed(2) ?? '--'} UV`,
    d.radiation >= 7 ? '#ff3333' : d.radiation >= 5 ? '#ffd700' : '#00ff87');
  setAR('ar-gas',     d.gas_status ?? '--',
    d.gas_status === 'LEAK' ? '#ff3333' : '#00ff87');
  setAR('ar-cool',    `${d.coolant?.toFixed(1) ?? '--'} %`,
    d.coolant < 10 ? '#ff3333' : d.coolant < 30 ? '#ffd700' : '#00d4ff');
  setAR('ar-ai',      d.ai_anomaly ? 'ANOMALY!' : 'NORMAL',
    d.ai_anomaly ? '#ff3333' : '#00ff87');
  setAR('ar-time',    new Date().toLocaleTimeString('en-GB'));
}

async function fetchData() {
  try {
    const res = await fetch(API);
    if (!res.ok) throw new Error('API unreachable');
    const d = await res.json();
    updateHUD(d);
    updateAR(d);
  } catch (e) {
    document.getElementById('hud-status').textContent = 'OFFLINE';
    document.getElementById('hud-status').style.color = '#ff3333';
  }
}

fetchData();
setInterval(fetchData, 3000);
</script>
</body>
</html>
